
name: Java CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build with Maven
        run: mvn -B package --file pom.xml

      - name: Run tests
        run: mvn test

      - name: Check code formatting (Checkstyle)
        run: mvn checkstyle:check

      - name: Static code analysis (SpotBugs)
        run: mvn spotbugs:check || true

      - name: Dependency vulnerability scan (OWASP Dependency-Check)
        run: mvn org.owasp:dependency-check-maven:check || true

      - name: Generate test coverage report (JaCoCo)
        run: mvn jacoco:report

      - name: Upload build artifact
        uses: actions/upload-artifact@v3
        with:
          name: login-service-jar
          path: target/*.jar
